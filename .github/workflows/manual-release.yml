name: Manual Release
on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'
permissions:
  contents: write
  packages: write
  id-token: write
jobs:
  bump-and-release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
          persist-credentials: false
      - name: Configure Git
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:$PAT_TOKEN@github.com/$GITHUB_REPOSITORY"
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          version: "latest"
          enable-cache: false
      - name: Set up Python
        run: uv python install 3.12
      - name: Install bump-my-version
        run: uv tool install bump-my-version
      - name: Get current version
        id: current_version
        run: |
          CURRENT_VERSION=$(uv tool run bump-my-version show current_version)
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"
      - name: Bump version
        id: bump_version
        env:
          VERSION_BUMP: ${{ github.event.inputs.version_bump }}
        run: |
          echo "Bumping $VERSION_BUMP version..."
          uv tool run bump-my-version bump "$VERSION_BUMP" --no-commit --no-tag

          NEW_VERSION=$(uv tool run bump-my-version show current_version)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"
      - name: Update lockfile
        run: uv lock
      - name: Commit and tag version bump
        env:
          OLD_VERSION: ${{ steps.current_version.outputs.version }}
          NEW_VERSION: ${{ steps.bump_version.outputs.version }}
        run: |
          git add pyproject.toml src/atomic_red_team_mcp/__init__.py uv.lock
          git commit -m "Bump version: $OLD_VERSION → $NEW_VERSION"
          git tag -a "v$NEW_VERSION" -m "Bump version: $OLD_VERSION → $NEW_VERSION"
      - name: Push changes
        env:
          NEW_VERSION: ${{ steps.bump_version.outputs.version }}
        run: |
          git push origin main
          git push origin "v$NEW_VERSION"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          NEW_VERSION: ${{ steps.bump_version.outputs.version }}
          OLD_VERSION: ${{ steps.current_version.outputs.version }}
          VERSION_BUMP: ${{ github.event.inputs.version_bump }}
          REPO: ${{ github.repository }}
        run: |
          gh release create "v$NEW_VERSION" \
            --title "Release v$NEW_VERSION" \
            --generate-notes \
            --notes "## Changes in v$NEW_VERSION

          Version bumped from $OLD_VERSION to $NEW_VERSION ($VERSION_BUMP release)

          ### What's Changed
          See the [commit history](https://github.com/$REPO/compare/v$OLD_VERSION...v$NEW_VERSION) for details.

          ### Installation

          **Using uvx (recommended):**
          \`\`\`bash
          uvx atomic-red-team-mcp@$NEW_VERSION
          \`\`\`

          **Using Docker:**
          \`\`\`bash
          docker run --rm -i ghcr.io/$REPO:$NEW_VERSION
          \`\`\`

          **From PyPI:**
          \`\`\`bash
          pip install atomic-red-team-mcp==$NEW_VERSION
          \`\`\`"
